devices: (
{
    name: "MX Master 4";
    smartshift: { on: true; threshold: 15; };
    hiresscroll: { hires: true; invert: false; target: false; };
    dpi: 2000;
    buttons: (
        {
            cid: 0x1a0;
            action = {
                type: "Gestures";
                gestures: (
                    {
                        direction: "None";
                        mode: "OnRelease";
                        action = {
                            type: "Keypress";
                            keys: ["KEY_LEFTCTRL", "KEY_SPACE"];
                        };
                    }
                );
            };
        }
    );
}
);
