---
- name: Instalar gnome-extensions-cli via pipx
  become: false
  ansible.builtin.command: pipx install gnome-extensions-cli
  args:
    creates: /home/marcosxavier/.local/bin/gext

# Instala extensões pelo UUID — estável, nunca muda, sem ID numérico.
# A ativação e configurações (dconf) são aplicadas pelo chezmoi via
# run_onchange, que roda com sessão de usuário e D-Bus ativos.
- name: Instalar extensões GNOME pelo UUID
  become: false
  ansible.builtin.command: "gext install {{ item }}"
  args:
    creates: "/home/marcosxavier/.local/share/gnome-shell/extensions/{{ item }}"
  loop:
    - appindicatorsupport@rgcjonas.gmail.com
    - arcmenu@arcmenu.com
    - Bluetooth-Battery-Meter@maniacx.github.com
    - blur-my-shell@aunetx
    - caffeine@patapon.info
    - dash-to-panel@jderose9.github.com
    - draw-on-gnome@daveprowse.github.io
    - emoji-copy@felipeftn
    - mediacontrols@cliffniff.github.com
    - screenshort-cut@pauloimon
    - tilingshell@ferrarodomenico.com
    - transparent-window-moving@noobsai.github.com
    - vertical-workspaces@G-dH.github.com
  loop_control:
    label: "{{ item }}"
