precedence = "aggregate"
SPDX-FileCopyrightText = "NeighNeighNeigh <https://github.com/NeighNeighNeigh>"
SPDX-License-Identifier = "MIT"

# Font from: https://fonts.google.com/specimen/Space+Grotesk
[[annotations]]
path = ["SpaceGrotesk-Bold.otf"]
precedence = "aggregate"
