[[annotations]]
path = ["presets/*.json"]
precedence = "aggregate"
SPDX-FileCopyrightText = "NeighNeighNeigh <https://github.com/NeighNeighNeigh>"
SPDX-License-Identifier = "MIT"


[[annotations]]
path = ["presets/Reass Red.json"]
precedence = "override"
SPDX-FileCopyrightText = "Ba reass <https://github.com/reassDev>"
